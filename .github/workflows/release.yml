name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            *.exe \
            *.exe.blockmap \
            *.yml \
            --title "${{ github.ref_name }}" \
            --notes "Automated release for ${{ github.ref_name }}"